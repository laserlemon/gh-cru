name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 1.25 is the go.mod floor (set by cli/go-gh/v2 upstream); `stable`
        # auto-picks up new Go releases without a config edit. When 1.26
        # ships, `stable` covers it; add the explicit minor here only if
        # Go itself stops supporting it but we want to keep working.
        go: ["1.25", "stable"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...
